<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentá tu documentación — Distrocuyo</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Nunito+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/distrocuyo.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100vh; }
    .main-content { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 16px; }
    .wrapper { width:100%; max-width:560px; }
    .actions { padding:20px 24px; }
    .success-state { text-align:center; padding:48px 28px; display:none; }
    .success-state .check { font-size:52px; margin-bottom:16px; }
    .success-state h2 { font-family:var(--font-display); font-size:26px; font-weight:800; color:var(--blue); margin-bottom:8px; }
    .success-state p { font-size:14px; color:var(--ink2); margin-bottom:24px; }
    .btn-outline { background:none; border:1.5px solid var(--border); color:var(--ink2); padding:10px 24px; border-radius:var(--radius-sm); font-family:var(--font-display); font-size:14px; font-weight:700; cursor:pointer; transition:all .2s; }
    .btn-outline:hover { border-color:var(--blue); color:var(--blue); }
  </style>
</head>
<body>

  <div class="accent-bar"></div>

  <nav class="topbar">
    <a class="distro-logo" href="/">
      <img src="/static/logo.png" alt="Distrocuyo" onerror="this.outerHTML='<span style=\"font-family:var(--font-display);font-weight:800;color:var(--blue);font-size:18px\">Distrocuyo</span>
    </a>
    <div class="topbar-right">
      <span class="username">{{USER_NAME}}</span>
      <a href="/auth/logout" class="logout-btn">Cerrar sesión</a>
    </div>
  </nav>

  <div class="main-content">
    <div class="wrapper">

      <div class="page-header anim-down">
        <div class="page-eyebrow">Gestión Documental</div>
        <h1>Presentá tu documentación</h1>
        <p>Subí tus comprobantes del mes de forma simple y segura.</p>
      </div>

      <div class="card anim-up anim-delay-1" id="form-card">

        <div class="field">
          <label>Tu nombre completo</label>
          <input type="text" id="nombre-input" placeholder="Ej: Juan García" oninput="actualizarBtn()">
        </div>
        <div class="field">
          <label>Tu DNI</label>
          <input type="text" id="dni-input" placeholder="Ej: 30123456" oninput="actualizarBtn()">
        </div>

        <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
          <div class="dz-icon">📄</div>
          <p>Arrastrá tus PDFs aquí</p>
          <small>o hacé clic para seleccionar · podés subir varios a la vez</small>
        </div>
        <input type="file" id="file-input" multiple accept="application/pdf" style="display:none">

        <div class="file-list" id="file-list"></div>

        <div class="actions">
          <div class="alert alert-error"   id="alert-error"></div>
          <div class="alert alert-success" id="alert-success"></div>
          <button class="btn btn-primary btn-full btn-lg" id="btn-subir" onclick="subir()" disabled>
            Enviar documentos
          </button>
        </div>

      </div>

      <div class="card success-state anim-up" id="success-card">
        <div class="card-body" style="text-align:center;padding:48px 28px">
          <div class="check">✅</div>
          <h2 style="font-family:var(--font-display);font-size:26px;font-weight:800;color:var(--blue);margin-bottom:8px">¡Documentos enviados!</h2>
          <p id="success-msg" style="font-size:14px;color:var(--ink2);margin-bottom:24px">Tus archivos fueron recibidos correctamente.</p>
          <button class="btn-outline" onclick="reiniciar()">Subir más archivos</button>
        </div>
      </div>

    </div>
  </div>

<script>
  let archivos = [];
  const dropzone  = document.getElementById('dropzone');
  const fileInput = document.getElementById('file-input');

  dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('dragover'); agregarArchivos(e.dataTransfer.files); });
  fileInput.addEventListener('change', e => agregarArchivos(e.target.files));

  function agregarArchivos(files) {
    for (const f of files) {
      if (f.type !== 'application/pdf') continue;
      if (archivos.find(a => a.name === f.name)) continue;
      archivos.push(f);
    }
    renderFileList(); actualizarBtn();
  }
  function renderFileList() {
    document.getElementById('file-list').innerHTML = archivos.map((f, i) => `
      <div class="file-item">
        <span>📄</span>
        <span class="fname">${f.name}</span>
        <span class="fsize">${(f.size/1024).toFixed(0)} KB</span>
        <button class="frem" onclick="eliminar(${i})">✕</button>
      </div>`).join('');
  }
  function eliminar(i) { archivos.splice(i, 1); renderFileList(); actualizarBtn(); }
  function actualizarBtn() {
    const nombre = document.getElementById('nombre-input').value.trim();
    const dni    = document.getElementById('dni-input').value.trim();
    document.getElementById('btn-subir').disabled = !nombre || !dni || archivos.length === 0;
  }
  async function subir() {
    const nombre = document.getElementById('nombre-input').value.trim();
    const dni    = document.getElementById('dni-input').value.trim();
    const btn    = document.getElementById('btn-subir');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Enviando…';
    document.getElementById('alert-error').style.display = 'none';
    try {
      const form = new FormData();
      form.append('nombre', nombre); form.append('dni', dni);
      archivos.forEach(f => form.append('pdfs', f));
      const res  = await fetch('/api/upload', { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al enviar.');
      document.getElementById('success-msg').textContent = `Se enviaron ${data.subidos.length} archivo(s) correctamente.`;
      document.getElementById('form-card').style.display    = 'none';
      document.getElementById('success-card').style.display = 'block';
    } catch (err) {
      const el = document.getElementById('alert-error');
      el.textContent = '⚠ ' + err.message; el.style.display = 'block';
      btn.disabled = false; btn.innerHTML = 'Enviar documentos';
    }
  }
  function reiniciar() {
    archivos = [];
    document.getElementById('nombre-input').value = '';
    document.getElementById('dni-input').value = '';
    document.getElementById('file-list').innerHTML = '';
    document.getElementById('form-card').style.display    = 'block';
    document.getElementById('success-card').style.display = 'none';
    actualizarBtn();
  }
</script>
</body>
</html>
