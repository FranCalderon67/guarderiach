services:
  guarderia-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guarderia-facturas-container
    ports:
      - "8083:8000"
    volumes:
      - /opt/guarderia/facturas:/opt/guarderia/facturas
    environment:
      - FLASK_ENV=development  # <─── Cambiado a development para permitir cookies sin HTTPS localmente
      - OAUTHLIB_INSECURE_TRANSPORT=1  # <─── ¡AGREGADO ACÁ! Permite flujos OAuth por HTTP
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - AZURE_CONNECTION_STRING=${AZURE_CONNECTION_STRING}
      - AZURE_CONTAINER_NAME=${AZURE_CONTAINER_NAME}
      - SAP_CLIENT_ID=${SAP_CLIENT_ID}
      - SAP_CLIENT_SECRET=${SAP_CLIENT_SECRET}
      - SAP_TOKEN_URL=${SAP_TOKEN_URL}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID}
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID}
      - ENTRA_CLIENT_SECRET=${ENTRA_CLIENT_SECRET}
      - ENTRA_REDIRECT_URI=${ENTRA_REDIRECT_URI}
      - ENTRA_ADMIN_GROUP_ID=${ENTRA_ADMIN_GROUP_ID}
    restart: unless-stopped