trigger:
  - main

# Definimos el agente de Windows (tu computadora local)
pool:
  name: 'Default'

variables:
  azureServiceConnection: 'scgic' # Nombre de tu conexión de Azure en DevOps
  webAppName: 'appguarderia-distrocuyo'     # Nombre del App Service
  nodeVersion: '18.x'

stages:
- stage: Build
  displayName: 'Fase de Construcción'
  jobs:
  - job: BuildJob
    steps:
    # 1. Configurar/Garantizar la versión de Node.js en la máquina
    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)
      displayName: 'Configurar Node.js $(nodeVersion)'

    # 2. Instalar dependencias en la raíz, backend y frontend (usando comandos de Windows cmd)
    - script: |
        echo "=== Instalando dependencias de la raiz ==="
        npm install
        
        echo "=== Instalando dependencias del Backend ==="
        if exist backend (
            cd backend
            npm install
            cd ..
        )
        
        echo "=== Instalando dependencias y compilando Frontend ==="
        if exist frontend (
            cd frontend
            npm install
            npm run build --if-present
            cd ..
        )
      displayName: 'Instalar dependencias y Compilar'

    # 3. Empaquetar todo el proyecto en un archivo ZIP
    - task: ArchiveFiles@2
      displayName: 'Empaquetar ZIP'
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
        replaceExistingArchive: true

    # 4. Publicar el archivo empaquetado como artefacto de Azure DevOps
    - task: PublishBuildArtifacts@1
      displayName: 'Publicar Artefacto'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
        ArtifactName: 'drop'

- stage: Deploy
  displayName: 'Fase de Despliegue'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          # 5. Desplegar el artefacto ZIP en Azure App Service Linux configurado con Node 18
          - task: AzureWebApp@1
            displayName: 'Desplegar en App Service Linux (Node)'
            inputs:
              azureSubscription: $(azureServiceConnection)
              appType: 'webAppLinux'
              appName: $(webAppName)
              package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
              runtimeStack: 'NODE|18-lts'
              # NOTA: Si el archivo de inicio de tu backend está en "backend/server.js" o "backend/index.js",
              # puedes descomentar la siguiente línea para indicárselo a Azure:
              # startUpCommand: 'node backend/server.js'