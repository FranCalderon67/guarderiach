trigger:
  - main

# Usamos tu máquina local como agente
pool:
  name: 'Default'

variables:
  azureServiceConnection: 'scgic' # Asegúrate de que esta conexión tenga permisos sobre el nuevo App Service
  webAppName: 'distrocuyo-gic'     # Nombre de tu App Service en Azure
  nodeVersion: '18.x'

stages:
- stage: Build
  displayName: 'Fase de Construcción'
  jobs:
  - job: BuildJob
    steps:
    # 1. Intentar garantizar la versión de Node.js (requiere que el agente local lo permita, si no, usa el Node global de tu PC)
    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)
      displayName: 'Configurar Node.js $(nodeVersion)'

    # 2. Instalar dependencias del proyecto raíz y compilar (si aplica)
    - script: |
        npm ci
        # Si necesitas compilar el frontend o backend, descomenta las siguientes líneas según corresponda:
        # cd frontend && npm ci && npm run build && cd ..
        # cd backend && npm ci && cd ..
      displayName: 'Instalar dependencias y Compilar'

    # 3. Empaquetar todo el directorio de trabajo para producción
    - task: ArchiveFiles@2
      displayName: 'Empaquetar ZIP'
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
        replaceExistingArchive: true

    # 4. Publicar el artefacto en Azure Pipelines
    - task: PublishBuildArtifacts@1
      displayName: 'Publicar Artefacto'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
        ArtifactName: 'drop'

- stage: Deploy
  displayName: 'Fase de Despliegue'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          # 5. Desplegar el ZIP al Azure App Service de Linux corriendo Node 18
          - task: AzureWebApp@1
            displayName: 'Desplegar en App Service Linux (Node)'
            inputs:
              azureSubscription: $(azureServiceConnection)
              appType: 'webAppLinux'
              appName: $(webAppName)
              package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
              runtimeStack: 'NODE|18-lts'
              # Si tu archivo de entrada está dentro de backend (ej: backend/server.js), puedes indicarlo aquí:
              # startUpCommand: 'node backend/server.js'